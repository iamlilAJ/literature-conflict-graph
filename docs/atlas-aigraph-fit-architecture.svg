<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1620 720" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Arrow markers for each Atlas edge type -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f77b4"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7f0e"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2ca02c"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d62728"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9467bd"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <!-- TITLE BAR -->
  <text x="810" y="35" text-anchor="middle" font-size="22" font-weight="600" fill="#222">
    atlas × aigraph — two-graph geometry
  </text>
  <text x="810" y="60" text-anchor="middle" font-size="13" fill="#666">
    Panel A: Atlas (paper-paper evolution).  Panel B: aigraph (paper-claim conflict).  Panel C: joint at J2 (recommended target).
  </text>

  <!-- ===================== PANEL A: ATLAS ===================== -->
  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="500" height="600" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="20" y="32" font-size="17" font-weight="600" fill="#1f4e79">Panel A. Atlas (1,030,314 papers, 4.14M edges)</text>
    <text x="20" y="52" font-size="12" fill="#888">Method-level forward causal lineage. 7 edge types. No contradicts.</text>

    <!-- 4 paper nodes -->
    <circle cx="100" cy="180" r="40" fill="#dceaf7" stroke="#1f4e79" stroke-width="1.5"/>
    <text x="100" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#1f4e79">paper_a</text>
    <text x="100" y="194" text-anchor="middle" font-size="10" fill="#666">y=2019, NeurIPS</text>

    <circle cx="380" cy="180" r="40" fill="#dceaf7" stroke="#1f4e79" stroke-width="1.5"/>
    <text x="380" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#1f4e79">paper_b</text>
    <text x="380" y="194" text-anchor="middle" font-size="10" fill="#666">y=2021, ICML</text>

    <circle cx="100" cy="380" r="40" fill="#dceaf7" stroke="#1f4e79" stroke-width="1.5"/>
    <text x="100" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#1f4e79">paper_c</text>
    <text x="100" y="394" text-anchor="middle" font-size="10" fill="#666">y=2020, ICLR</text>

    <circle cx="380" cy="380" r="40" fill="#dceaf7" stroke="#1f4e79" stroke-width="1.5"/>
    <text x="380" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#1f4e79">paper_d</text>
    <text x="380" y="394" text-anchor="middle" font-size="10" fill="#666">y=2022, NeurIPS</text>

    <!-- edges: a -[extends]-> b -->
    <line x1="142" y1="172" x2="338" y2="172" stroke="#1f77b4" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="240" y="166" text-anchor="middle" font-size="11" fill="#1f77b4">extends</text>

    <!-- a -[improves]-> b (lower band) -->
    <line x1="142" y1="194" x2="338" y2="194" stroke="#ff7f0e" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="240" y="218" text-anchor="middle" font-size="11" fill="#ff7f0e">improves</text>

    <!-- a -[replaces]-> c (vertical) -->
    <line x1="100" y1="222" x2="100" y2="338" stroke="#d62728" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="60" y="285" text-anchor="middle" font-size="11" fill="#d62728">replaces</text>

    <!-- b -[compares]-> d (vertical, right) -->
    <line x1="380" y1="222" x2="380" y2="338" stroke="#2ca02c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="430" y="285" text-anchor="middle" font-size="11" fill="#2ca02c">compares</text>

    <!-- c -[uses_component]-> d (lower row) -->
    <line x1="142" y1="380" x2="338" y2="380" stroke="#9467bd" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="240" y="374" text-anchor="middle" font-size="11" fill="#9467bd">uses_component</text>

    <!-- d -[adapts]-> a (long diagonal back) -->
    <path d="M 350 415 Q 240 480 130 415" fill="none" stroke="#1f77b4" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow-blue)"/>
    <text x="240" y="478" text-anchor="middle" font-size="11" fill="#1f77b4">adapts</text>

    <!-- d -[background]-> b would clutter; show in legend instead -->

    <!-- bottleneck callout on b -->
    <g transform="translate(280, 90)">
      <rect x="0" y="0" width="200" height="40" fill="#fff3e0" stroke="#ff7f0e" stroke-width="1" rx="4"/>
      <text x="6" y="14" font-size="10" font-weight="600" fill="#ff7f0e">bottleneck_json (paper_b)</text>
      <text x="6" y="28" font-size="9.5" fill="#444">"paper_a's method fails on</text>
      <text x="6" y="38" font-size="9.5" fill="#444">long-context queries"</text>
    </g>
    <line x1="380" y1="142" x2="380" y2="128" stroke="#ff7f0e" stroke-width="0.8" stroke-dasharray="2 2"/>

    <!-- Edge type legend -->
    <g transform="translate(20, 480)">
      <text x="0" y="0" font-size="11" font-weight="600" fill="#444">7 evolution_relation types:</text>
      <g transform="translate(0, 16)">
        <line x1="0" y1="0" x2="22" y2="0" stroke="#1f77b4" stroke-width="2"/><text x="28" y="4" font-size="10" fill="#444">extends</text>
        <line x1="80" y1="0" x2="102" y2="0" stroke="#ff7f0e" stroke-width="2"/><text x="108" y="4" font-size="10" fill="#444">improves</text>
        <line x1="170" y1="0" x2="192" y2="0" stroke="#d62728" stroke-width="2"/><text x="198" y="4" font-size="10" fill="#444">replaces</text>
        <line x1="248" y1="0" x2="270" y2="0" stroke="#2ca02c" stroke-width="2"/><text x="276" y="4" font-size="10" fill="#444">compares</text>
        <line x1="334" y1="0" x2="356" y2="0" stroke="#9467bd" stroke-width="2"/><text x="362" y="4" font-size="10" fill="#444">uses_component</text>
      </g>
      <g transform="translate(0, 32)">
        <line x1="0" y1="0" x2="22" y2="0" stroke="#1f77b4" stroke-width="2" stroke-dasharray="4 2"/><text x="28" y="4" font-size="10" fill="#444">adapts</text>
        <line x1="80" y1="0" x2="102" y2="0" stroke="#666" stroke-width="2"/><text x="108" y="4" font-size="10" fill="#444">background</text>
      </g>
    </g>
    <text x="20" y="568" font-size="11" fill="#888">8,155 method_id nodes (separate layer; not shown).</text>
    <text x="20" y="585" font-size="11" fill="#888">99.8% non-empty bottleneck/impact/mechanism JSON.</text>
  </g>

  <!-- ===================== PANEL B: AIGRAPH ===================== -->
  <g transform="translate(560, 100)">
    <rect x="0" y="0" width="500" height="600" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="20" y="32" font-size="17" font-weight="600" fill="#7a3b1a">Panel B. aigraph (paper-claim conflict, 8 anomaly types)</text>
    <text x="20" y="52" font-size="12" fill="#888">Stance + open-questions at claim granularity. Within and across papers.</text>

    <!-- Paper nodes (3 of them) -->
    <ellipse cx="100" cy="170" rx="55" ry="32" fill="#fce6cf" stroke="#7a3b1a" stroke-width="1.5"/>
    <text x="100" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#7a3b1a">paper P</text>
    <text x="100" y="183" text-anchor="middle" font-size="10" fill="#666">arxiv:2024.xxx</text>

    <ellipse cx="400" cy="170" rx="55" ry="32" fill="#fce6cf" stroke="#7a3b1a" stroke-width="1.5"/>
    <text x="400" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#7a3b1a">paper Q</text>
    <text x="400" y="183" text-anchor="middle" font-size="10" fill="#666">arxiv:2024.yyy</text>

    <ellipse cx="250" cy="450" rx="55" ry="32" fill="#fce6cf" stroke="#7a3b1a" stroke-width="1.5"/>
    <text x="250" y="447" text-anchor="middle" font-size="12" font-weight="600" fill="#7a3b1a">paper R</text>
    <text x="250" y="463" text-anchor="middle" font-size="10" fill="#666">arxiv:2025.zzz</text>

    <!-- Claim nodes (3 on P, 2 on Q, 2 on R) -->
    <!-- claim c1 (pos) on P -->
    <rect x="55" y="240" width="90" height="40" fill="#e8f5e9" stroke="#2ca02c" stroke-width="1.2" rx="3"/>
    <text x="100" y="258" text-anchor="middle" font-size="11" fill="#2ca02c">c1 (pos)</text>
    <text x="100" y="272" text-anchor="middle" font-size="9.5" fill="#444">RAG helps factual</text>

    <!-- claim c2 (neg) on P -->
    <rect x="55" y="290" width="90" height="40" fill="#ffebee" stroke="#d62728" stroke-width="1.2" rx="3"/>
    <text x="100" y="308" text-anchor="middle" font-size="11" fill="#d62728">c2 (neg)</text>
    <text x="100" y="322" text-anchor="middle" font-size="9.5" fill="#444">RAG hurts code-gen</text>

    <!-- claim c3 (neg) on Q -->
    <rect x="355" y="240" width="90" height="40" fill="#ffebee" stroke="#d62728" stroke-width="1.2" rx="3"/>
    <text x="400" y="258" text-anchor="middle" font-size="11" fill="#d62728">c3 (neg)</text>
    <text x="400" y="272" text-anchor="middle" font-size="9.5" fill="#444">RAG hurts factual</text>

    <!-- claim c4 (pos) on R -->
    <rect x="200" y="365" width="90" height="40" fill="#e8f5e9" stroke="#2ca02c" stroke-width="1.2" rx="3"/>
    <text x="245" y="383" text-anchor="middle" font-size="11" fill="#2ca02c">c4 (pos)</text>
    <text x="245" y="397" text-anchor="middle" font-size="9.5" fill="#444">RAG helps math</text>

    <!-- paper-to-claim edges -->
    <line x1="100" y1="202" x2="100" y2="240" stroke="#7a3b1a" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="100" y1="202" x2="100" y2="290" stroke="#7a3b1a" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="400" y1="202" x2="400" y2="240" stroke="#7a3b1a" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="250" y1="418" x2="245" y2="405" stroke="#7a3b1a" stroke-width="1" stroke-dasharray="2 2"/>

    <!-- benchmark_inconsistency anomaly: c1 vs c3 -->
    <path d="M 145 260 Q 250 220 355 260" fill="none" stroke="#9467bd" stroke-width="2" stroke-dasharray="6 3"/>
    <g transform="translate(225, 198)">
      <rect x="0" y="0" width="120" height="32" fill="#f3e5f5" stroke="#9467bd" stroke-width="1" rx="3"/>
      <text x="60" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#9467bd">anomaly:</text>
      <text x="60" y="27" text-anchor="middle" font-size="10" fill="#9467bd">benchmark_inconsist.</text>
    </g>

    <!-- open question on P -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="180" height="36" fill="#fff8e1" stroke="#f9a825" stroke-width="1" rx="3"/>
      <text x="6" y="14" font-size="10" font-weight="600" fill="#f9a825">open_question (paper P):</text>
      <text x="6" y="28" font-size="9.5" fill="#444">"unclear when RAG helps"</text>
    </g>

    <!-- 8 anomaly type legend -->
    <g transform="translate(20, 505)">
      <text x="0" y="0" font-size="11" font-weight="600" fill="#444">8 anomaly types (5 conflict, 3 structural):</text>
      <g transform="translate(0, 18)">
        <text x="0" y="0" font-size="9.5" fill="#9467bd">• benchmark_inconsistency</text>
        <text x="0" y="14" font-size="9.5" fill="#9467bd">• impact_conflict</text>
        <text x="0" y="28" font-size="9.5" fill="#9467bd">• metric_mismatch</text>
        <text x="170" y="0" font-size="9.5" fill="#9467bd">• setting_mismatch</text>
        <text x="170" y="14" font-size="9.5" fill="#9467bd">• replication_conflict</text>
        <text x="170" y="28" font-size="9.5" fill="#1f77b4">• evidence_gap</text>
        <text x="340" y="0" font-size="9.5" fill="#1f77b4">• community_disconnect</text>
        <text x="340" y="14" font-size="9.5" fill="#1f77b4">• bridge_opportunity</text>
      </g>
    </g>
    <text x="20" y="585" font-size="11" fill="#888">~25 canonical_method buckets — orders of magnitude coarser than V_M.</text>
  </g>

  <!-- ===================== PANEL C: JOINT (J2) ===================== -->
  <g transform="translate(1100, 100)">
    <rect x="0" y="0" width="500" height="600" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="6"/>
    <text x="20" y="32" font-size="17" font-weight="600" fill="#374b6e">Panel C. Joint graph (J2 — recommended target)</text>
    <text x="20" y="52" font-size="12" fill="#888">Atlas blue/red edges (paper-paper) + aigraph orange edges (paper-claim) + 3 new joint detectors.</text>

    <!-- Two papers shared between the views -->
    <ellipse cx="100" cy="180" rx="55" ry="32" fill="#e1eef9" stroke="#374b6e" stroke-width="1.5"/>
    <text x="100" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#374b6e">paper A</text>
    <text x="100" y="194" text-anchor="middle" font-size="10" fill="#666">Atlas + aigraph</text>

    <ellipse cx="400" cy="180" rx="55" ry="32" fill="#e1eef9" stroke="#374b6e" stroke-width="1.5"/>
    <text x="400" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#374b6e">paper B</text>
    <text x="400" y="194" text-anchor="middle" font-size="10" fill="#666">Atlas + aigraph</text>

    <!-- Atlas edge A -[improves]-> B (top) -->
    <path d="M 155 165 L 345 165" fill="none" stroke="#ff7f0e" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
    <text x="250" y="158" text-anchor="middle" font-size="11" fill="#ff7f0e">Atlas: improves</text>

    <!-- Atlas-bottleneck (annotation) -->
    <g transform="translate(170, 100)">
      <rect x="0" y="0" width="170" height="28" fill="#fff3e0" stroke="#ff7f0e" stroke-width="0.8" rx="3"/>
      <text x="6" y="12" font-size="9.5" font-weight="600" fill="#ff7f0e">Atlas bottleneck(A):</text>
      <text x="6" y="24" font-size="9.5" fill="#444">"A breaks on multi-hop"</text>
    </g>

    <!-- aigraph claims on A -->
    <rect x="55" y="240" width="90" height="32" fill="#e8f5e9" stroke="#2ca02c" stroke-width="1" rx="3"/>
    <text x="100" y="254" text-anchor="middle" font-size="10" fill="#2ca02c">A.c1 (pos)</text>
    <text x="100" y="266" text-anchor="middle" font-size="9" fill="#444">single-hop QA</text>

    <rect x="55" y="280" width="90" height="32" fill="#ffebee" stroke="#d62728" stroke-width="1" rx="3"/>
    <text x="100" y="294" text-anchor="middle" font-size="10" fill="#d62728">A.c2 (neg)</text>
    <text x="100" y="306" text-anchor="middle" font-size="9" fill="#444">multi-hop QA</text>

    <!-- aigraph claim on B -->
    <rect x="355" y="240" width="90" height="32" fill="#e8f5e9" stroke="#2ca02c" stroke-width="1" rx="3"/>
    <text x="400" y="254" text-anchor="middle" font-size="10" fill="#2ca02c">B.c5 (pos)</text>
    <text x="400" y="266" text-anchor="middle" font-size="9" fill="#444">multi-hop QA</text>

    <!-- open_question of A -->
    <g transform="translate(20, 360)">
      <rect x="0" y="0" width="180" height="40" fill="#fff8e1" stroke="#f9a825" stroke-width="1" rx="3"/>
      <text x="6" y="14" font-size="10" font-weight="600" fill="#f9a825">A.open_q:</text>
      <text x="6" y="26" font-size="9.5" fill="#444">"limits on multi-hop"</text>
      <text x="6" y="38" font-size="9.5" fill="#444">  ↔ aligns with Atlas bottleneck</text>
    </g>

    <!-- joint anomaly: bottleneck_open_q_alignment -->
    <g transform="translate(220, 360)">
      <rect x="0" y="0" width="240" height="50" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5" rx="3"/>
      <text x="120" y="16" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3949ab">JOINT ANOMALY (new):</text>
      <text x="120" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#3949ab">bottleneck_open_q_alignment</text>
      <text x="120" y="45" text-anchor="middle" font-size="9.5" fill="#666">consensus weakness — gold signal</text>
    </g>
    <line x1="200" y1="380" x2="220" y2="385" stroke="#3949ab" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="345" y1="100" x2="280" y2="360" stroke="#3949ab" stroke-width="0.8" stroke-dasharray="2 2"/>

    <!-- second joint anomaly: silent_replacement -->
    <g transform="translate(50, 450)">
      <rect x="0" y="0" width="220" height="50" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5" rx="3"/>
      <text x="110" y="16" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c2185b">JOINT ANOMALY (new):</text>
      <text x="110" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#c2185b">silent_replacement</text>
      <text x="110" y="45" text-anchor="middle" font-size="9.5" fill="#666">aigraph says contradict / Atlas no edge</text>
    </g>

    <!-- third joint anomaly: unresolved_replacement -->
    <g transform="translate(280, 450)">
      <rect x="0" y="0" width="200" height="50" fill="#e0f2f1" stroke="#00695c" stroke-width="1.5" rx="3"/>
      <text x="100" y="16" text-anchor="middle" font-size="10.5" font-weight="700" fill="#00695c">JOINT ANOMALY (new):</text>
      <text x="100" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#00695c">unresolved_replacement</text>
      <text x="100" y="45" text-anchor="middle" font-size="9.5" fill="#666">Atlas replaces / aigraph mixed</text>
    </g>

    <!-- benchmark inconsistency from aigraph: c2 vs c5 -->
    <path d="M 145 296 Q 250 320 355 256" fill="none" stroke="#9467bd" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="250" y="285" text-anchor="middle" font-size="10" fill="#9467bd">aigraph: benchmark_inconsistency</text>

    <text x="20" y="550" font-size="11" fill="#888">Atlas edges = paper-paper layer.  aigraph edges = paper-claim layer.</text>
    <text x="20" y="567" font-size="11" fill="#888">Join key = paper.arxiv_id_base (94% intersection on 540p).</text>
    <text x="20" y="584" font-size="11" fill="#888">Joint anomalies fire ONLY when both layers contribute signal.</text>
  </g>

  <!-- footer -->
  <text x="810" y="710" text-anchor="middle" font-size="10.5" fill="#888">
    cc, 2026-05-14 · recon/atlas-aigraph-fit · branch worktree only
  </text>
</svg>
